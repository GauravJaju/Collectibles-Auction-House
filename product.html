<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auctions – Collectibles Auction House</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23C9963A'/><text y='.9em' font-size='72' x='12'>🏆</text></svg>">
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">🏆</div>
    <div class="logo-text">
      <span>Collectibles</span>
      <span>Auction House</span>
    </div>
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="product.html">Auctions</a>
    <a href="service.html">Services</a>
    <a href="contact.html">Contact</a>
    <a href="product.html" class="watchlist-nav" id="watchlistNav">♡ Wishlist <span class="watchlist-count" id="watchlistCount">0</span></a>
  </nav>
</header>

<section class="page">
  <h1>Live Auctions</h1>
  <p>Bid on rare, authenticated collectibles from around the world. Every item is verified by our expert team.</p>

  <div class="auction-toolbar">
    <span class="auction-count" id="auctionCount">20 items live</span>
    <div class="sort-wrap">
      <label for="sortSelect">Sort by:</label>
      <select id="sortSelect">
        <option value="default">Default</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="watchers">Most Watched</option>
        <option value="ending">Ending Soon</option>
      </select>
    </div>
  </div>

  <div class="grid" id="auctionGrid"></div>
</section>

<!-- Confetti canvas -->
<canvas id="confettiCanvas"></canvas>

<footer>© 2025 Collectibles Auction House. All rights reserved.</footer>
<script src="script.js"></script>
</body>
</html>
