<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23C9963A'/><text y='.9em' font-size='72' x='12'>🏆</text></svg>">
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">🏆</div>
    <div class="logo-text">
      <span>Collectibles</span>
      <span>Auction House</span>
    </div>
  </a>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="product.html">Auctions</a>

    <a href="watchlist.html" class="watchlist-nav" id="watchlistNav">♡ Wishlist <span class="watchlist-count" id="watchlistCount">0</span></a>
  </nav>
</header>

<section class="page">
  <h1>Contact Us</h1>
  <p>Have a question about an item or auction? We're happy to help. Fill out the form and our team will get back to you within 24 hours.</p>

  <form id="contactForm">

    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" required>

    <label for="message">Message</label>
    <textarea id="message" placeholder="Write your message here…" required></textarea>

    <button type="submit">Send Message</button>

  </form>
</section>

<footer>© 2025 Collectibles Auction House. All rights reserved.</footer>

<script src="script.js"></script>
</body>
